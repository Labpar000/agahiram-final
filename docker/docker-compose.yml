services:
  postgres:
    image: postgres:16-alpine
    container_name: agahiram-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agahiram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agahiram_dev}
      POSTGRES_DB: ${POSTGRES_DB:-agahiram}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agahiram}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agahiram-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme_dev}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: agahiram-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-agahiram_meili_dev_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      # Use 127.0.0.1 — Alpine resolves localhost to ::1 but Meili listens on IPv4 only.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  livekit:
    image: livekit/livekit-server:latest
    container_name: agahiram-livekit-dev
    restart: unless-stopped
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"

  minio:
    image: minio/minio:latest
    container_name: agahiram-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agahiram}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agahiram_minio_dev}
      # Legacy direct MinIO PUTs (uploads now go via API proxy). Kept for tooling.
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:5173,http://localhost:3001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc:latest
    container_name: agahiram-createbuckets
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 2 &&
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-agahiram} ${MINIO_ROOT_PASSWORD:-agahiram_minio_dev} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-agahiram} &&
      echo 'bucket ready';
      "

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
