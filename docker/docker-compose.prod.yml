services:
  postgres:
    image: postgres:16-alpine
    container_name: agahiram-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - agahiram
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agahiram-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    networks:
      - agahiram
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: agahiram-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    networks:
      - agahiram

  minio:
    image: minio/minio:latest
    container_name: agahiram-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Allow the browser to PUT directly to presigned URLs served via Caddy.
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ORIGIN:-https://${DOMAIN}}
    volumes:
      - minio_data:/data
    networks:
      - agahiram
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: create the bucket (no anonymous download — media served via API proxy).
  createbuckets:
    image: minio/mc:latest
    container_name: agahiram-createbuckets
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/${MINIO_BUCKET:-agahiram} &&
      mc anonymous set download local/${MINIO_BUCKET:-agahiram}/posts &&
      mc anonymous set download local/${MINIO_BUCKET:-agahiram}/avatars &&
      mc anonymous set download local/${MINIO_BUCKET:-agahiram}/reels &&
      mc anonymous set download local/${MINIO_BUCKET:-agahiram}/stories &&
      echo 'bucket ready (public read: posts/avatars/reels/stories; messages via API proxy)';
      "
    networks:
      - agahiram

  api:
    image: ${IMAGE_REGISTRY:-ghcr.io/labpar000/agahiram}/api:${IMAGE_TAG:-latest}
    container_name: agahiram-api
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - agahiram

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io/labpar000/agahiram}/web:${IMAGE_TAG:-latest}
    container_name: agahiram-web
    restart: always
    env_file: .env
    # Tell Next.js (rewrites + image optimizer) to reach the API over the
    # docker network instead of falling back to 127.0.0.1:4000, which obviously
    # doesn't exist inside the web container. Without this, /_next/image
    # requests for `/api/v1/media/object?key=…` URLs come back as 400 because
    # the optimizer can't fetch the upstream image.
    environment:
      API_UPSTREAM_URL: http://api:4000
      INTERNAL_API_URL: http://api:4000
    depends_on:
      - api
    networks:
      - agahiram

  admin:
    image: ${IMAGE_REGISTRY:-ghcr.io/labpar000/agahiram}/admin:${IMAGE_TAG:-latest}
    container_name: agahiram-admin
    restart: always
    env_file: .env
    depends_on:
      - api
    networks:
      - agahiram

  worker:
    image: ${IMAGE_REGISTRY:-ghcr.io/labpar000/agahiram}/worker:${IMAGE_TAG:-latest}
    container_name: agahiram-worker
    restart: always
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - agahiram

  livekit:
    image: livekit/livekit-server:latest
    container_name: agahiram-livekit
    restart: always
    command: --config /etc/livekit.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "50000-50100:50000-50100/udp"
    networks:
      - agahiram

  caddy:
    image: caddy:2-alpine
    container_name: agahiram-caddy
    restart: always
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - admin
      - api
      - minio
      - livekit
    networks:
      - agahiram

networks:
  agahiram:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  meili_data:
  minio_data:
  caddy_data:
  caddy_config:
