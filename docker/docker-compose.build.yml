# Local / fallback build overrides — use with docker-compose.prod.yml:
#   docker compose -f docker-compose.prod.yml -f docker-compose.build.yml build web
#
# Production deploy pulls pre-built images from GHCR (see docker-compose.prod.yml).

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-/}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-${NEXT_PUBLIC_APP_URL:-/}}
        NEXT_PUBLIC_MAPIR_API_KEY: ${NEXT_PUBLIC_MAPIR_API_KEY:-}
        API_UPSTREAM_URL: ${API_UPSTREAM_URL:-http://api:4000}

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-/}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-/}

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
