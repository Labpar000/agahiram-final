name: Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: false

env:
  APP_DIR: ${{ vars.APP_DIR || '/opt/agahiram' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 60
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN || 'agahiram.ir' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing SSH_HOST secret" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing SSH_USER secret" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "Missing SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/agahiram_deploy_key
          chmod 600 ~/.ssh/agahiram_deploy_key

      - name: Package source
        run: |
          tar \
            --exclude-vcs \
            --exclude=".cursor" \
            --exclude="node_modules" \
            --exclude="**/node_modules" \
            --exclude=".turbo" \
            --exclude="tmp" \
            --exclude=".cache" \
            --exclude="**/.next" \
            --exclude="**/dist" \
            -czf /tmp/agahiram-src.tar.gz .

      - name: Deploy over SSH
        run: |
          SSH_COMMON_OPTS="-i ~/.ssh/agahiram_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-src.tar.gz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/agahiram-src.tar.gz"
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "APP_DIR='$APP_DIR' bash -s" <<'REMOTE'
          set -euo pipefail

          mkdir -p "$APP_DIR"
          tar -xzf /tmp/agahiram-src.tar.gz -C "$APP_DIR"
          cd "$APP_DIR"

          cd docker
          export DOCKER_BUILDKIT=1
          export COMPOSE_DOCKER_CLI_BUILD=1
          docker builder prune -af >/dev/null 2>&1 || true
          for svc in api web admin worker; do
            docker compose -f docker-compose.prod.yml build "$svc"
          done
          docker compose -f docker-compose.prod.yml up -d postgres redis meilisearch
          docker compose -f docker-compose.prod.yml run --rm --workdir /app api sh -lc '/app/node_modules/.bin/prisma migrate deploy --schema /app/packages/database/prisma/schema.prisma'
          docker compose -f docker-compose.prod.yml up -d --force-recreate api web admin worker caddy
          docker image prune -f
          docker compose -f docker-compose.prod.yml ps
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/agahiram_deploy_key
