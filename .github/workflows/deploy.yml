name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      force_services:
        description: 'Force rebuild these services (space-separated, empty = auto-detect)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

env:
  APP_DIR: ${{ vars.APP_DIR || '/opt/agahiram' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
  PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}
  IMAGE_REGISTRY: ghcr.io/labpar000/agahiram-final
  IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}

jobs:
  scope:
    name: Detect deploy scope
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      services_json: ${{ steps.detect.outputs.services_json }}
      build_services: ${{ steps.detect.outputs.build_services }}
      config_only: ${{ steps.detect.outputs.config_only }}
      need_build: ${{ steps.detect.outputs.need_build }}
      need_deploy: ${{ steps.detect.outputs.need_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect scope
        id: detect
        run: |
          if [[ -n "${{ inputs.force_services }}" ]]; then
            BUILD_SERVICES="${{ inputs.force_services }}"
            CONFIG_ONLY=""
            NEED_CONFIG_SYNC=1
          else
            eval "$(bash scripts/detect-build-services.sh --env HEAD~1 HEAD)"
          fi
          echo "build_services=$BUILD_SERVICES" >> "$GITHUB_OUTPUT"
          echo "config_only=$CONFIG_ONLY" >> "$GITHUB_OUTPUT"

          if [[ -n "${BUILD_SERVICES// /}" ]]; then
            SERVICES_JSON="$(printf '%s\n' $BUILD_SERVICES | jq -R . | jq -s -c .)"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          else
            SERVICES_JSON='[]'
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "services_json=$SERVICES_JSON" >> "$GITHUB_OUTPUT"

          if [[ -n "${BUILD_SERVICES// /}" || -n "$CONFIG_ONLY" || "$NEED_CONFIG_SYNC" == "1" ]]; then
            echo "need_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_deploy=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Will build: ${BUILD_SERVICES:-none}"
          echo "Config only: ${CONFIG_ONLY:-none}"

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.need_build == 'true'
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.scope.outputs.services_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        if: matrix.service == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/api:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker
        if: matrix.service == 'worker'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/worker:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push web
        if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/web:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_WS_URL=
            NEXT_PUBLIC_APP_URL=/
            NEXT_PUBLIC_SOCKET_URL=/
            API_UPSTREAM_URL=http://api:4000

      - name: Build and push admin
        if: matrix.service == 'admin'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.admin
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/admin:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REGISTRY }}/admin:latest
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_WS_URL=/
            NEXT_PUBLIC_APP_URL=/

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [scope, build]
    if: >
      needs.scope.outputs.need_deploy == 'true' &&
      (needs.scope.outputs.need_build != 'true' || needs.build.result == 'success')
    timeout-minutes: 25
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing SSH_HOST secret" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing SSH_USER secret" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "Missing SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/agahiram_deploy_key
          chmod 600 ~/.ssh/agahiram_deploy_key

      - name: Package config
        run: |
          bash scripts/package-config.sh /tmp/agahiram-config.tar.gz
          sha256sum /tmp/agahiram-config.tar.gz | awk '{print $1}' > /tmp/agahiram-config.sha256

      - name: Log in to GHCR (runner)
        if: needs.scope.outputs.build_services != ''
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Export images for VPS transfer
        if: needs.scope.outputs.build_services != ''
        env:
          BUILD_SERVICES: ${{ needs.scope.outputs.build_services }}
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          bash scripts/export-images.sh "$IMAGE_REGISTRY" "$IMAGE_TAG" /tmp/agahiram-images.tar.gz $BUILD_SERVICES
          sha256sum /tmp/agahiram-images.tar.gz | awk '{print $1}' > /tmp/agahiram-images.sha256

      - name: Deploy (SCP images + transfer on VPS)
        env:
          SSH_COMMON_OPTS: -i ~/.ssh/agahiram_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=15 -o ServerAliveCountMax=60
          BUILD_SERVICES: ${{ needs.scope.outputs.build_services }}
          CONFIG_ONLY: ${{ needs.scope.outputs.config_only }}
          NEED_BUILD: ${{ needs.scope.outputs.need_build }}
        run: |
          set -euo pipefail
          HOST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"

          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-config.tar.gz "$HOST:/tmp/agahiram-config.tar.gz"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-config.sha256 "$HOST:/tmp/agahiram-config.sha256"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" scripts/remote-deploy.sh "$HOST:/tmp/remote-deploy.sh"
          if [[ -n "${BUILD_SERVICES// /}" && -f /tmp/agahiram-images.tar.gz ]]; then
            scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-images.tar.gz "$HOST:/tmp/agahiram-images.tar.gz"
            scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-images.sha256 "$HOST:/tmp/agahiram-images.sha256"
          fi
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "$HOST" "chmod +x /tmp/remote-deploy.sh"

          IMAGES_ENV=""
          if [[ -n "${BUILD_SERVICES// /}" && -f /tmp/agahiram-images.tar.gz ]]; then
            IMAGES_ENV="IMAGES_TARBALL=/tmp/agahiram-images.tar.gz IMAGES_SHA256='$(cat /tmp/agahiram-images.sha256)'"
          fi

          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "$HOST" \
            "env APP_DIR='$APP_DIR' DOMAIN='$PRODUCTION_DOMAIN' DEPLOY_MODE=transfer \
             IMAGE_REGISTRY='$IMAGE_REGISTRY' IMAGE_TAG='$IMAGE_TAG' \
             BUILD_SERVICES='$BUILD_SERVICES' CONFIG_ONLY='$CONFIG_ONLY' NEED_BUILD='$NEED_BUILD' \
             CONFIG_TARBALL='/tmp/agahiram-config.tar.gz' \
             CONFIG_SHA256='$(cat /tmp/agahiram-config.sha256)' \
             $IMAGES_ENV \
             bash /tmp/remote-deploy.sh"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/agahiram_deploy_key
