name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: true

env:
  APP_DIR: ${{ vars.APP_DIR || '/opt/agahiram' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
  PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}
  IMAGE_REGISTRY: ghcr.io/labpar000/agahiram

jobs:
  scope:
    name: Detect deploy scope
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    outputs:
      services_json: ${{ steps.detect.outputs.services_json }}
      build_services: ${{ steps.detect.outputs.build_services }}
      config_only: ${{ steps.detect.outputs.config_only }}
      need_build: ${{ steps.detect.outputs.need_build }}
      need_deploy: ${{ steps.detect.outputs.need_deploy }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Detect scope
        id: detect
        run: |
          eval "$(bash scripts/detect-build-services.sh --env HEAD~1 HEAD)"
          echo "build_services=$BUILD_SERVICES" >> "$GITHUB_OUTPUT"
          echo "config_only=$CONFIG_ONLY" >> "$GITHUB_OUTPUT"

          if [[ -n "${BUILD_SERVICES// /}" ]]; then
            SERVICES_JSON="$(printf '%s\n' $BUILD_SERVICES | jq -R . | jq -s -c .)"
            echo "need_build=true" >> "$GITHUB_OUTPUT"
          else
            SERVICES_JSON='[]'
            echo "need_build=false" >> "$GITHUB_OUTPUT"
          fi
          echo "services_json=$SERVICES_JSON" >> "$GITHUB_OUTPUT"

          if [[ -n "${BUILD_SERVICES// /}" || -n "$CONFIG_ONLY" ]]; then
            echo "need_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "need_deploy=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Will build: ${BUILD_SERVICES:-none}"
          echo "Config only: ${CONFIG_ONLY:-none}"

  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: scope
    if: needs.scope.outputs.need_build == 'true'
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.scope.outputs.services_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push api
        if: matrix.service == 'api'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/api:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_REGISTRY }}/api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push worker
        if: matrix.service == 'worker'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.worker
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/worker:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_REGISTRY }}/worker:latest
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Build and push web
        if: matrix.service == 'web'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/web:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_REGISTRY }}/web:latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_WS_URL=
            NEXT_PUBLIC_APP_URL=/
            NEXT_PUBLIC_SOCKET_URL=/
            API_UPSTREAM_URL=http://api:4000

      - name: Build and push admin
        if: matrix.service == 'admin'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.admin
          push: true
          tags: |
            ${{ env.IMAGE_REGISTRY }}/admin:${{ github.event.workflow_run.head_sha || github.sha }}
            ${{ env.IMAGE_REGISTRY }}/admin:latest
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          build-args: |
            NEXT_PUBLIC_API_URL=/api/v1
            NEXT_PUBLIC_WS_URL=/
            NEXT_PUBLIC_APP_URL=/

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [scope, build]
    if: |
      always() &&
      needs.scope.outputs.need_deploy == 'true' &&
      (needs.scope.outputs.need_build != 'true' || needs.build.result == 'success')
    timeout-minutes: 30
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing SSH_HOST secret" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing SSH_USER secret" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "Missing SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/agahiram_deploy_key
          chmod 600 ~/.ssh/agahiram_deploy_key

      - name: Package config
        run: |
          bash scripts/package-config.sh /tmp/agahiram-config.tar.gz
          sha256sum /tmp/agahiram-config.tar.gz | awk '{print $1}' > /tmp/agahiram-config.sha256

      - name: Upload config and deploy
        env:
          SSH_COMMON_OPTS: -i ~/.ssh/agahiram_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=120
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
          BUILD_SERVICES: ${{ needs.scope.outputs.build_services }}
          CONFIG_ONLY: ${{ needs.scope.outputs.config_only }}
          GHCR_TOKEN: ${{ secrets.GHCR_PULL_TOKEN != '' && secrets.GHCR_PULL_TOKEN || github.token }}
        run: |
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-config.tar.gz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/agahiram-config.tar.gz.tmp"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-config.sha256 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/agahiram-config.sha256"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" scripts/remote-deploy.sh "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/remote-deploy.sh"
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mv /tmp/agahiram-config.tar.gz.tmp /tmp/agahiram-config.tar.gz && chmod +x /tmp/remote-deploy.sh"

          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "nohup env APP_DIR='$APP_DIR' DOMAIN='$PRODUCTION_DOMAIN' DEPLOY_MODE=pull \
             IMAGE_REGISTRY='$IMAGE_REGISTRY' IMAGE_TAG='$IMAGE_TAG' \
             BUILD_SERVICES='$BUILD_SERVICES' CONFIG_ONLY='$CONFIG_ONLY' \
             CONFIG_TARBALL='/tmp/agahiram-config.tar.gz' \
             CONFIG_SHA256='$(cat /tmp/agahiram-config.sha256)' \
             GHCR_TOKEN='$GHCR_TOKEN' \
             GHCR_USER='${{ github.repository_owner }}' \
             bash /tmp/remote-deploy.sh > /tmp/agahiram-deploy.log 2>&1 & echo \$! > /tmp/agahiram-deploy.pid"

          for i in $(seq 1 40); do
            STATUS=$(ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
              "cat /tmp/agahiram-deploy.status 2>/dev/null || echo running")
            echo "deploy status: $STATUS"
            if [[ "$STATUS" == "done" ]]; then exit 0; fi
            if [[ "$STATUS" == failed* ]]; then
              ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
                "tail -30 /tmp/agahiram-deploy.log" || true
              exit 1
            fi
            sleep 15
          done
          echo "deploy timed out"
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "tail -30 /tmp/agahiram-deploy.log" || true
          exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/agahiram_deploy_key
