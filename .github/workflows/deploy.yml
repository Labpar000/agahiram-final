name: Deploy Production

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production
  cancel-in-progress: true

env:
  APP_DIR: ${{ vars.APP_DIR || '/opt/agahiram' }}
  SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
  PRODUCTION_DOMAIN: ${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    timeout-minutes: 90
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    environment:
      name: production
      url: https://${{ vars.PRODUCTION_DOMAIN || 'alooche.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.SSH_HOST }}" || (echo "Missing SSH_HOST secret" && exit 1)
          test -n "${{ secrets.SSH_USER }}" || (echo "Missing SSH_USER secret" && exit 1)
          test -n "${{ secrets.SSH_KEY }}" || (echo "Missing SSH_KEY secret" && exit 1)

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/agahiram_deploy_key
          chmod 600 ~/.ssh/agahiram_deploy_key

      - name: Test SSH connectivity
        run: |
          SSH_COMMON_OPTS="-i ~/.ssh/agahiram_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30"
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" "echo connected && uname -a"

      - name: Package source
        run: |
          tar \
            --exclude-vcs \
            --exclude=".cursor" \
            --exclude="node_modules" \
            --exclude="**/node_modules" \
            --exclude=".pnpm-store" \
            --exclude=".pnpm-meta" \
            --exclude=".turbo" \
            --exclude="tmp" \
            --exclude=".cache" \
            --exclude="**/.next" \
            --exclude="**/dist" \
            -czf /tmp/agahiram-src.tar.gz .

      - name: Determine build scope
        id: build_scope
        run: |
          git fetch --depth=2 origin "${{ github.event.workflow_run.head_sha || github.sha }}" 2>/dev/null || true
          SERVICES=$(bash scripts/detect-build-services.sh HEAD~1 HEAD)
          echo "services=$SERVICES" >> "$GITHUB_OUTPUT"
          echo "Will build: $SERVICES"

      - name: Deploy over SSH
        run: |
          SSH_COMMON_OPTS="-i ~/.ssh/agahiram_deploy_key -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          scp $SSH_COMMON_OPTS -P "$SSH_PORT" /tmp/agahiram-src.tar.gz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/tmp/agahiram-src.tar.gz"
          ssh $SSH_COMMON_OPTS -p "$SSH_PORT" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "APP_DIR='$APP_DIR' DOMAIN='$PRODUCTION_DOMAIN' SRC_TARBALL='/tmp/agahiram-src.tar.gz' BUILD_SERVICES='${{ steps.build_scope.outputs.services }}' bash -s" \
            < scripts/remote-deploy.sh

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/agahiram_deploy_key
