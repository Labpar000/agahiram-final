name: Release Drafter

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  draft:
    name: Draft GitHub Release Notes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Draft release
        uses: release-drafter/release-drafter@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

