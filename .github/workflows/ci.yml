name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  quality:
    name: Format and Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm format:check

      # Build libs only (tsc, ~30s). Next.js production build runs in Deploy Docker — not here.
      - name: Build libraries
        run: pnpm turbo run build --filter='./packages/*' --filter='./workers/*'

      - name: Typecheck apps
        run: pnpm turbo run lint --filter='@agahiram/api' --filter='@agahiram/web' --filter='@agahiram/admin' --filter='@agahiram/ui'

      - name: ESLint
        run: ESLINT_USE_FLAT_CONFIG=false pnpm lint:eslint

      - name: Unit and API tests
        run: pnpm test

      - name: Install Playwright browsers
        run: pnpm --filter @agahiram/web exec playwright install --with-deps chromium

      - name: E2E smoke tests
        run: pnpm test:e2e

      - name: Verify media byte-range (optional)
        if: vars.MEDIA_RANGE_TEST_URL != ''
        run: bash scripts/check-media-range.sh "${{ vars.MEDIA_RANGE_TEST_URL }}"
