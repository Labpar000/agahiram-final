name: Bug Report
description: Report a reproducible bug in Agahiram.
title: "fix: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "Windows 11, Chrome 125, production"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell

